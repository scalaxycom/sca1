apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
spec:
  releaseName: rook-ceph
  chart:
    spec:
      chart: rook-ceph
      version: ${ROOK_RELEASE}
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
        namespace: rook-ceph
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: rook-ceph-values
