apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  releaseName: ingress-nginx
  chart:
    spec:
      chart: ingress-nginx
      #version: 1.13.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: openstack
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: ingress-nginx-values
