apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: skyline
spec:
  releaseName: skyline
  chart:
    spec:
      chart: skyline
      version: ${skyline}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: keystone
    - name: nova
    - name: neutron
    - name: horizon
  install:
    disableWait: true
    disableWaitForJobs: true
  upgrade:
    disableWait: true
    disableWaitForJobs: true
  interval: 1h0m0s
#  install:
#    remediation:
#      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: skyline-values
