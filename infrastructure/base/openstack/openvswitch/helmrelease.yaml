apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openvswitch
spec:
  releaseName: openvswitch
  chart:
    spec:
      chart: openvswitch
      version: ${openvswitch}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: openvswitch-values
