apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gnocchi
spec:
  releaseName: gnocchi
  chart:
    spec:
      chart: gnocchi
      version: ${gnocchi}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: keystone
    - name: nova
    - name: neutron
    - name: cinder
    - name: postgresql
  install:
    disableWait: true
    disableWaitForJobs: true
  upgrade:
    disableWait: true
    disableWaitForJobs: true
  interval: 1h0m0s
#  install:
#    remediation:
#      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: gnocchi-values
