images:
  tags:
    bootstrap: "quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    db_init: "quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    db_drop: "quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    ks_user: "quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    ks_service: "quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    ks_endpoints: "quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    glance_db_sync: "quay.io/airshipit/glance:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    glance_api: "quay.io/airshipit/glance:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    glance_metadefs_load: "quay.io/airshipit/glance:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}"
    glance_storage_init: "quay.io/airshipit/ceph-config-helper:latest-${OPENSTACK_DIST}"

storage: rbd

conf:
  glance:
      DEFAULT:
        workers: 2
        show_multiple_locations: True
        show_image_direct_url: True

endpoints:
  identity:
    auth:
      admin:
        password: ${keystone_admin_password}
      glance:
        password: ${glance_admin_password}
      test:
        password: ${glance_test_password}
  oslo_db:
    auth:
      admin:
        password: ${mariadb_root_password}
      glance:
        password: ${glance_db_password}
  oslo_cache:
    auth:
      memcache_secret_key: ${memcache_secret_key}
  oslo_messaging:
    auth:
      admin:
        password: ${rabbitmq_admin_password}
      glance:
        password: ${glance_rabbitmq_password}
    statefulset:
      replicas: 3
  image:
    host_fqdn_override:
      public:
        host: "glance.${HOST}"
        tls:
          secretName: ingress-cert
          issuerRef:
            name: letsencrypt
            kind: ClusterIssuer
    scheme:
      public: https
    port:
      api:
        public: 443

secrets:
  tls:
    image:
      api:
        public: ingress-cert

