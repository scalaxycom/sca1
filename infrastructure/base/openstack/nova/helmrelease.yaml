apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nova
spec:
  releaseName: nova
  chart:
    spec:
      chart: nova
      version: ${nova}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: keystone
  install:
    disableWait: true
    disableWaitForJobs: true
  upgrade:
    disableWait: true
    disableWaitForJobs: true
  interval: 1h0m0s
#  install:
#    remediation:
#      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: nova-values
