endpoints:
  identity:
    auth:
      admin:
        password: ${keystone_admin_password}
      octavia:
        password: ${octavia_admin_password}
      test:
        password: ${octavia_test_password}
  oslo_db:
    auth:
      admin:
        password: ${mariadb_root_password}
      octavia:
        password: ${octavia_db_password}
  oslo_db_persistence:
    auth:
      admin:
        password: ${mariadb_root_password}
      octavia:
        password: ${octavia_db_password}
  oslo_cache:
    auth:
      memcache_secret_key: ${memcache_secret_key}
  oslo_messaging:
    auth:
      admin:
        password: ${rabbitmq_admin_password}
      octavia:
        password: ${octavia_rabbitmq_password}
    statefulset:
      replicas: 3
  valkey:
    hosts:
      default: valkey-primary
    password: ${VALKEY_PASSWORD}
  load_balancer:
    host_fqdn_override:
      public:
        host: "octavia.${HOST}"
        tls:
          secretName: ingress-cert
          issuerRef:
            name: letsencrypt
            kind: ClusterIssuer
    scheme:
      public: https
    port:
      api:
        public: 443

bootstrap:
  enabled: true
  ks_user: admin
  script: |
    openstack role create --or-show load-balancer_admin
    openstack role create --or-show load-balancer_observer
    openstack role create --or-show load-balancer_global_observer
    openstack role create --or-show load-balancer_quota_admin
    openstack role create --or-show load-balancer_member

    openstack quota set admin \
    --instances -1 \
    --cores -1 \
    --ram -1 \
    --properties -1 \
    --key-pairs -1 \
    --server-groups -1 \
    --server-group-members -1 \
    --networks -1 \
    --ports -1 \
    --subnets -1 \
    --routers -1 \
    --floating-ips -1 \
    --secgroups -1 \
    --secgroup-rules -1 \
    --rbac-policies -1 \
    --volumes -1 \
    --gigabytes -1 \
    --snapshots -1 \
    --backups -1 \
    --backup-gigabytes -1 \
    --force

    for i in `openstack network agent list -f value -c "Agent Type" -c Host | awk '/L3/ {print $3}' | sort`; do
    openstack port show octavia-health-manager-port-$i || \
      openstack port set --device-owner Octavia:health-mgr --host=$i octavia-health-manager-port-$i \
      openstack port show octavia-health-manager-port-$i -f value -c binding_host_id -c device_owner
    openstack port show octavia-worker-port-$i || \
      openstack port set --device-owner Octavia:worker --host=$i octavia-worker-port-$i \
      openstack port show octavia-worker-port-$i -f value -c binding_host_id -c device_owner
    done

    openstack keypair show octavia_ssh_key || \
      openstack keypair create --private-key /tmp/octavia_key octavia_ssh_key && \
      export TOKEN=$(openstack token issue -f value -c id) && \
      export KEY=$(cat /tmp/octavia_key |sed ':a;N;$!ba;s/\\/\\\\/g;s/"/\\"/g;s/\n/\\n/g') && \
      curl -X POST \
        -H "content-type:application/json" \
        -H "X-Auth-Token: $TOKEN" \
        -d "{\"name\": \"octavia_ssh_key\", \"payload\": \"$KEY\", \"payload_content_type\": \"text/plain\"}" \
        http://barbican.openstack.svc.cluster.local/v1/secrets 

    openstack network show external_network || \
      openstack network create --share --external --provider-physical-network external --provider-segment ${EXTERTAL_NETWORK_VLAN} --provider-network-type vlan external_network

    openstack subnet show external_subnet1 || \
      openstack subnet create --no-dhcp \
      --allocation-pool "start=${EXTERTAL_NETWORK_START},end=${EXTERNAL_NETWORK_END}" \
      --network external_network --subnet-range "${EXTERTAL_NETWORK_RANGE}" \
      --gateway ${EXTERTAL_NETWORK_GW} external_subnet1

secrets:
  tls:
    load_balancer:
      api:
        public: ingress-cert

