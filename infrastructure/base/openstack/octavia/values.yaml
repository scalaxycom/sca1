    controller_worker:
      # amp_image_owner_id: ${OSH_AMPHORA_IMAGE_OWNER_ID}
      # amp_secgroup_list: ${OSH_AMPHORA_SECGROUP_LIST}
      # amp_flavor_id: ${OSH_AMPHORA_FLAVOR_ID}
      # amp_boot_network_list: ${OSH_AMPHORA_BOOT_NETWORK_LIST}
      loadbalancer_topology: 'ACTIVE_STANDBY'
    health_manager:
      bind_port: 5555
      bind_ip: 0.0.0.0
      controller_ip_port_list: ${CONTROLLER_IP_PORT_LIST}
    task_flow:
      jobboard_enabled: false
    certificates:
      endpoint_type: internalURL
      ca_private_key_passphrase: ${octavia_certificates_password}
    cinder:
      endpoint_type: internalURL
      valid_interfaces: internal
    database:
      connection_debug: 0
      connection_recycle_time: 600
      connection_trace: true
      idle_timeout: 3600
      mysql_sql_mode: {}
      use_db_reconnect: true
      pool_timeout: 60
      max_retries: -1
      max_overflow: 60
      max_pool_size: 30
    glance:
      endpoint_type: internalURL
      valid_interfaces: internal
    keystone_authtoken:
      service_token_roles: service
      service_token_roles_required: true
      auth_type: password
      auth_version: v3
      memcache_security_strategy: ENCRYPT
      service_type: load-balancer
      valid_interfaces: internal
    neutron:
      endpoint_type: internalURL
      valid_interfaces: internal
    nova:
      enable_anti_affinity: "True"
      endpoint_type: internalURL
  octavia_api_uwsgi:
    uwsgi:
      wsgi-file: /var/lib/openstack/bin/octavia-wsgi
pod:
  replicas:
    api: 1
    worker: 1
    housekeeping: 1
  security_context:
    octavia_worker:
      container:
        octavia_worker:
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
    octavia_health_manager:
      container:
        octavia_health_manager:
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
  mounts:
    octavia_api:
      octavia_api:
        volumeMounts:
          - name: octavia-certs
            mountPath: /etc/octavia/certs/server_ca.cert.pem
            subPath: server_ca.cert.pem
          - name: octavia-certs
            mountPath: /etc/octavia/certs/server_ca-chain.cert.pem
            subPath: server_ca-chain.cert.pem
          - name: octavia-certs
            mountPath: /etc/octavia/certs/private/server_ca.key.pem
            subPath: server_ca.key.pem
          - name: octavia-certs
            mountPath: /etc/octavia/certs/client_ca.cert.pem
            subPath: client_ca.cert.pem
          - name: octavia-certs
            mountPath: /etc/octavia/certs/private/client.cert-and-key.pem
            subPath: client.cert-and-key.pem
        volumes:
          - name: octavia-certs
            secret:
              secretName: octavia-certs
              defaultMode: 0644
    octavia_worker:
      octavia_worker:
        volumeMounts:
          - name: octavia-certs
            mountPath: /etc/octavia/certs/server_ca.cert.pem
            subPath: server_ca.cert.pem
          - name: octavia-certs
