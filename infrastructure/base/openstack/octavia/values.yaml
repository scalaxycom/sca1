images:
  tags:
    bootstrap: quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    db_init: quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    octavia_db_sync: quay.io/airshipit/octavia:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    db_drop: quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    rabbit_init: docker.io/rabbitmq:3.13-management
    ks_user: quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    ks_service: quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    ks_endpoints: quay.io/airshipit/heat:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    dep_check: quay.io/airshipit/kubernetes-entrypoint:latest-${OPENSTACK_DIST}
    image_repo_sync: docker.io/docker:17.07.0
    octavia_api: quay.io/airshipit/octavia:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    octavia_driver_agent: quay.io/airshipit/octavia:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    octavia_worker: quay.io/airshipit/octavia:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    octavia_worker_init: quay.io/airshipit/openstack-client:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    octavia_housekeeping: quay.io/airshipit/octavia:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    octavia_health_manager: quay.io/airshipit/octavia:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    octavia_health_manager_init: quay.io/airshipit/openstack-client:${OPENSTACK_RELEASE}-${OPENSTACK_DIST}
    openvswitch_vswitchd: quay.io/airshipit/openvswitch:latest-${OPENSTACK_DIST}
  pull_policy: "Always"

