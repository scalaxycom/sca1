apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: octavia
spec:
  releaseName: octavia
  chart:
    spec:
      chart: octavia
      version: ${octavia}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: keystone
    - name: nova
    - name: neutron
  install:
    disableWait: true
    disableWaitForJobs: true
  upgrade:
    disableWait: true
    disableWaitForJobs: true
  interval: 1h0m0s
#  install:
#    remediation:
#      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: octavia-values
    - kind: ConfigMap
      name: octavia-worker-values
