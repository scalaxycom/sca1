apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neutron
spec:
  releaseName: neutron
  chart:
    spec:
      chart: neutron
      version: ${neutron}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: keystone
  install:
    disableWait: true
#    disableWaitForJobs: true
  upgrade:
    disableWait: true
#    disableWaitForJobs: true
  interval: 1h0m0s
#  install:
#    remediation:
#      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: neutron-values
