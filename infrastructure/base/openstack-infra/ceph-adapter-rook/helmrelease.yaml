apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-adapter-rook
spec:
  releaseName: ceph-adapter-rook
  chart:
    spec:
      chart: ceph-adapter-rook
      version: ${ceph_adapter_rook}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
  valuesFrom:
    - kind: ConfigMap
      name: ceph-adapter-rook-values