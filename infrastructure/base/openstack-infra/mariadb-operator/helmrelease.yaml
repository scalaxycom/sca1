apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator-crds
spec:
  releaseName: mariadb-operator-crds
  chart:
    spec:
      chart: mariadb-operator-crds
      #version: 1.13.1
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
        namespace: openstack
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
spec:
  releaseName: mariadb-operator
  chart:
    spec:
      chart: mariadb-operator
      #version: 1.13.1
      sourceRef:
        kind: HelmRepository
        name: mariadb-operator
        namespace: openstack
  dependsOn:
    - name: mariadb-operator-crds
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: mariadb-operator-values
