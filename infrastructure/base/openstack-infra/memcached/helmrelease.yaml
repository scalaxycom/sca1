apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memcached
spec:
  releaseName: memcached
  chart:
    spec:
      chart: memcached
      version: ${memcached}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: memcached-values
