apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
spec:
  releaseName: postgresql
  chart:
    spec:
      chart: postgresql
      version: ${postgresql}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: openebs
      namespace: openebs
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: postgresql-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: StatefulSet
              name: postgresql
            patch: |
              - op: replace
                path: /spec/template/spec/initContainers/1/args
                value: 
                - |
                  set -xe; 
                  /bin/chown 999 /var/lib/postgresql; 
                  /bin/chmod 700 /var/lib/postgresql; 
                  /bin/chmod 700 /var/lib/postgresql/* || exit 0;