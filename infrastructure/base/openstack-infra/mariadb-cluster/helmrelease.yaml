apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-cluster
spec:
  releaseName: mariadb-cluster
  chart:
    spec:
      chart: mariadb-cluster
      #version: 1.13.1
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  dependsOn:
    - name: mariadb
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: mariadb-cluster-values
