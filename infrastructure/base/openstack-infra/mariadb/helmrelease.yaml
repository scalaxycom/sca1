apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb
spec:
  releaseName: mariadb
  chart:
    spec:
      chart: mariadb
      version: ${mariadb}
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: openstack
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: mariadb-values
